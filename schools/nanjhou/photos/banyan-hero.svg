<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Stylised banyan canopy at golden hour — Nan-Jhou Elementary's signature Kuanrong tree">
  <defs>
    <!-- Sky from deep banyan green at top to warm sugar-amber at horizon -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#143226"/>
      <stop offset="42%" stop-color="#1f4631"/>
      <stop offset="78%" stop-color="#3a6549"/>
      <stop offset="100%" stop-color="#7a6a3a"/>
    </linearGradient>
    <!-- Warm golden sun glow behind canopy -->
    <radialGradient id="sun" cx="0.78" cy="0.50" r="0.42">
      <stop offset="0%"  stop-color="#f8d99a" stop-opacity="0.85"/>
      <stop offset="35%" stop-color="#e0a85c" stop-opacity="0.55"/>
      <stop offset="70%" stop-color="#c08a3f" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c08a3f" stop-opacity="0"/>
    </radialGradient>
    <!-- Distant haze for atmosphere -->
    <linearGradient id="haze" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f4631" stop-opacity="0"/>
      <stop offset="60%" stop-color="#3a6549" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#143226" stop-opacity="0.4"/>
    </linearGradient>
    <!-- A second smaller foliage cluster on the left side -->
    <radialGradient id="leftFoliage" cx="0.5" cy="0.55" r="0.5">
      <stop offset="0%"  stop-color="#1a3a26"/>
      <stop offset="100%" stop-color="#0c1f15"/>
    </radialGradient>
    <radialGradient id="rightFoliage" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"  stop-color="#1a3a26"/>
      <stop offset="100%" stop-color="#091a10"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="1920" height="600" fill="url(#sky)"/>

  <!-- Distant forest line (suggesting a school courtyard horizon with hedges) -->
  <path d="M 0 420 Q 200 405 400 415 Q 600 430 850 410 Q 1100 388 1350 408 Q 1600 430 1920 412 L 1920 600 L 0 600 Z" fill="url(#haze)"/>

  <!-- Sun glow behind main canopy -->
  <ellipse cx="1500" cy="260" rx="560" ry="320" fill="url(#sun)"/>

  <!-- Left mid-distance smaller banyan cluster (suggests row of campus trees) -->
  <g opacity="0.85">
    <ellipse cx="280"  cy="380" rx="170" ry="80"  fill="url(#leftFoliage)"/>
    <ellipse cx="430"  cy="365" rx="140" ry="72"  fill="url(#leftFoliage)"/>
    <ellipse cx="180"  cy="395" rx="120" ry="60"  fill="url(#leftFoliage)"/>
    <!-- Trunk hints -->
    <rect x="270"  y="430" width="22" height="100" fill="#091a10"/>
    <rect x="430"  y="420" width="20" height="110" fill="#091a10"/>
  </g>

  <!-- Main "Kuanrong" — the century-old banyan on the right -->
  <g>
    <!-- Trunk + aerial roots silhouette -->
    <path d="M 1465 600
             L 1452 460
             C 1428 420 1430 395 1442 370
             L 1438 320
             L 1430 280
             C 1432 250 1450 235 1470 232
             C 1492 230 1510 250 1512 285
             L 1518 330
             L 1528 360
             C 1542 380 1548 410 1538 440
             L 1545 600 Z" fill="#0a1d12"/>
    <!-- A second hanging aerial root -->
    <path d="M 1380 600 L 1378 480 C 1378 450 1390 432 1402 425 L 1402 600 Z" fill="#0a1d12" opacity="0.85"/>
    <path d="M 1610 600 L 1608 500 C 1608 470 1618 450 1632 442 L 1635 600 Z" fill="#0a1d12" opacity="0.85"/>

    <!-- Foliage canopy — soft overlapping ellipses (banyan crown) -->
    <ellipse cx="1480" cy="190"  rx="320" ry="160" fill="url(#rightFoliage)"/>
    <ellipse cx="1300" cy="240"  rx="240" ry="130" fill="url(#rightFoliage)"/>
    <ellipse cx="1660" cy="220"  rx="270" ry="140" fill="url(#rightFoliage)"/>
    <ellipse cx="1820" cy="280"  rx="220" ry="120" fill="url(#rightFoliage)"/>
    <ellipse cx="1450" cy="130"  rx="240" ry="110" fill="url(#rightFoliage)"/>
    <ellipse cx="1600" cy="100"  rx="200" ry="92"  fill="url(#rightFoliage)"/>
    <ellipse cx="1380" cy="180"  rx="160" ry="80"  fill="url(#rightFoliage)" opacity="0.9"/>
    <ellipse cx="1740" cy="160"  rx="180" ry="80"  fill="url(#rightFoliage)" opacity="0.9"/>

    <!-- Lighter highlights on canopy from sun (subtle warm rim) -->
    <ellipse cx="1620" cy="160" rx="80" ry="36" fill="#a87b3a" opacity="0.20"/>
    <ellipse cx="1720" cy="200" rx="70" ry="32" fill="#a87b3a" opacity="0.16"/>
  </g>

  <!-- A subtle warm ground glow far at the horizon (suggesting paved courtyard / track) -->
  <rect x="0" y="550" width="1920" height="50" fill="#091a10" opacity="0.45"/>

  <!-- A few small twinkles of distant lights — suggests the school's lit doorway in the dusk -->
  <g fill="#f8d99a" opacity="0.55">
    <circle cx="780"  cy="430" r="2.2"/>
    <circle cx="820"  cy="442" r="1.6"/>
    <circle cx="640"  cy="448" r="1.8"/>
    <circle cx="1080" cy="450" r="2.0"/>
  </g>
</svg>
