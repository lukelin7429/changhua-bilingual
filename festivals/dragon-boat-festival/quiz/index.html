<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Festival 08 Quiz · Dragon Boat Festival · Festival English Series</title>
<meta name="description" content="Festival 08 Quiz — Dragon Boat Festival. 12 questions on Qu Yuan's story, vocabulary, traditions, and roleplay. Festival English Series for the Changhua Bilingual Network.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--navy:#0c2e6b;--blue:#1a4791;--blue-soft:#dbe3f0;--olive:#c9c920;--olive-soft:#f0f1c3;--olive-deep:#8c8e0a;--red:#e63d2e;--red-soft:#fde2dd;--sun:#f0a722;--sun-soft:#feeed0;--sun-deep:#a06c10;--green:#5b9d5b;--green-soft:#e7f3e7;--cream:#fbf7e8;--cream-warm:#fffcef;--line:#e3dfca;--ink:#1f2530;--ink-soft:#5a606e;--shadow:0 16px 40px -16px rgba(12,46,107,.30);--shadow-sm:0 6px 18px -6px rgba(12,46,107,.20);}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{min-height:100%;background:#fff;color:var(--ink);font-family:'Inter','PingFang TC','Apple LiGothic Medium','Microsoft JhengHei',sans-serif;font-size:22px;line-height:1.6;-webkit-font-smoothing:antialiased;}
  @media (min-width:720px){ html,body{ font-size:25.5px; } }
  .wrap{max-width:840px;margin:0 auto;padding:32px 22px 60px;min-height:100vh;display:flex;flex-direction:column;}
  .head{background:var(--navy);color:#fff;border-radius:20px;padding:28px 28px;text-align:center;border-bottom:6px solid var(--olive);box-shadow:var(--shadow);}
  .head__brand{font-size:14.5px;letter-spacing:3px;color:var(--olive);text-transform:uppercase;font-weight:700;margin-bottom:8px;}
  @media (min-width:720px){ .head__brand{ font-size:16.5px; } }
  .head__title{font-family:'Playfair Display',serif;font-size:35px;font-weight:800;letter-spacing:.5px;line-height:1.1;}
  @media (min-width:720px){ .head__title{ font-size:48px; } }
  .head__sub{color:#cdd4ee;font-size:17.5px;margin-top:8px;font-style:italic;}
  @media (min-width:720px){ .head__sub{ font-size:21px; } }
  .card{background:#fff;border-radius:24px;border:1px solid var(--line);box-shadow:var(--shadow);padding:34px 30px;margin-top:26px;flex:1;display:flex;flex-direction:column;}
  @media (min-width:720px){ .card{ padding:48px 44px; } }
  .progress{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
  .progress__no{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--red);letter-spacing:1.5px;}
  @media (min-width:720px){ .progress__no{ font-size:24px; } }
  .progress__bar{flex:1;margin-left:18px;height:8px;background:var(--cream);border:1px solid var(--line);border-radius:99px;overflow:hidden;}
  @media (min-width:720px){ .progress__bar{ height:10px; } }
  .progress__fill{height:100%;background:var(--olive);border-radius:99px;transition:width .3s ease;width:0%;}
  .question{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--navy);line-height:1.4;margin-top:8px;letter-spacing:.2px;}
  @media (min-width:720px){ .question{ font-size:36px; } }
  .question__zh{font-size:18px;color:var(--ink-soft);line-height:1.55;margin-top:10px;}
  @media (min-width:720px){ .question__zh{ font-size:22px; } }
  .options{display:flex;flex-direction:column;gap:14px;margin-top:28px;}
  .opt{background:#fff;border:2px solid var(--line);border-radius:14px;padding:18px 20px;font-size:21px;font-family:inherit;font-weight:600;color:var(--ink);text-align:left;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:16px;line-height:1.4;}
  @media (min-width:720px){ .opt{ font-size:25px;padding:22px 24px; } }
  .opt:hover:not(:disabled){border-color:var(--olive);background:var(--cream-warm);transform:translateX(2px);}
  .opt__mark{width:42px;height:42px;border-radius:50%;background:var(--cream);color:var(--navy);display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;font-size:18px;border:2px solid var(--line);font-family:'Playfair Display',serif;}
  @media (min-width:720px){ .opt__mark{ width:48px;height:48px;font-size:21px; } }
  .opt.is-correct{background:var(--green-soft);border-color:var(--green);color:#2c6b2c;}
  .opt.is-correct .opt__mark{background:var(--green);color:#fff;border-color:var(--green);}
  .opt.is-wrong{background:var(--red-soft);border-color:var(--red);color:#8b2e22;}
  .opt.is-wrong .opt__mark{background:var(--red);color:#fff;border-color:var(--red);}
  .opt:disabled{cursor:default;}
  .feedback{margin-top:22px;padding:14px 18px;border-radius:12px;font-size:18px;font-weight:600;text-align:center;line-height:1.5;min-height:0;opacity:0;transition:opacity .2s;}
  @media (min-width:720px){ .feedback{ font-size:21px; } }
  .feedback.show{opacity:1;}
  .feedback--ok{background:var(--green-soft);color:#2c6b2c;border:1.5px solid var(--green);}
  .feedback--ng{background:var(--red-soft);color:#8b2e22;border:1.5px solid var(--red);}
  .result{text-align:center;}
  .result__emoji{font-size:72px;line-height:1;}
  @media (min-width:720px){ .result__emoji{ font-size:96px; } }
  .result__title{font-family:'Playfair Display',serif;font-size:36px;font-weight:700;color:var(--navy);margin-top:14px;letter-spacing:.5px;}
  @media (min-width:720px){ .result__title{ font-size:50px; } }
  .result__score{font-family:'Playfair Display',serif;font-size:68px;font-weight:800;color:var(--red);margin:18px 0 6px;line-height:1;}
  @media (min-width:720px){ .result__score{ font-size:92px; } }
  .result__score small{font-size:30px;color:var(--ink-soft);font-weight:600;font-family:inherit;}
  @media (min-width:720px){ .result__score small{ font-size:38px; } }
  .result__msg{font-size:22px;color:var(--ink);line-height:1.6;margin-top:16px;max-width:560px;margin-left:auto;margin-right:auto;}
  @media (min-width:720px){ .result__msg{ font-size:26px; } }
  .result__zh{font-size:17px;color:var(--ink-soft);margin-top:6px;}
  @media (min-width:720px){ .result__zh{ font-size:19px; } }
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:18px 32px;font-size:21px;font-weight:700;font-family:inherit;letter-spacing:.5px;border:none;border-radius:14px;cursor:pointer;text-decoration:none;transition:transform .15s, box-shadow .15s, background .15s;}
  @media (min-width:720px){ .btn{ font-size:24px;padding:20px 36px; } }
  .btn:active{transform:scale(.97);}
  .btn--primary{background:var(--olive);color:var(--navy);box-shadow:0 6px 18px -6px rgba(201,201,32,.5);}
  .btn--primary:hover{background:var(--navy);color:#fff;}
  .btn--ghost{background:#fff;color:var(--navy);border:2px solid var(--line);}
  .btn--ghost:hover{background:var(--cream-warm);border-color:var(--olive);}
  .result__actions{display:flex;flex-direction:column;gap:12px;margin-top:32px;align-items:center;}
  @media (min-width:720px){ .result__actions{ flex-direction:row;justify-content:center;gap:16px; } }
  .result__actions .btn{min-width:240px;}
  .foot{text-align:center;font-size:14.5px;color:var(--ink-soft);font-style:italic;letter-spacing:.5px;margin-top:24px;}
  @media (min-width:720px){ .foot{ font-size:16.5px; } }
  .foot a{color:var(--blue);text-decoration:none;border-bottom:1px solid var(--olive);}
  .foot a:hover{color:var(--navy);}
</style>
</head>
<body>

<div class="wrap">
  <header class="head">
    <div class="head__brand">Festival 08 · Festival English Series</div>
    <h1 class="head__title">Quiz · Dragon Boat Festival</h1>
    <div class="head__sub">端午節小測驗 · 12 questions · 共 12 題</div>
  </header>

  <main class="card" id="quiz-card">
    <div class="progress">
      <div class="progress__no" id="qno">Question 1 / 12</div>
      <div class="progress__bar"><div class="progress__fill" id="bar"></div></div>
    </div>
    <div class="question" id="question">Loading…</div>
    <div class="question__zh" id="question-zh"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
  </main>

  <main class="card result" id="result-card" style="display:none;">
    <div class="result__emoji" id="r-emoji">🐉</div>
    <div class="result__title" id="r-title">Happy Dragon Boat Day!</div>
    <div class="result__score">
      <span id="r-score">0</span> / <span id="r-total">12</span>
      <small id="r-pct">(0%)</small>
    </div>
    <p class="result__msg" id="r-msg-en">You did great!</p>
    <p class="result__zh" id="r-msg-zh">完成了！</p>
    <div class="result__actions">
      <button class="btn btn--primary" id="btn-restart">Try again · 再試一次</button>
      <a class="btn btn--ghost" href="../">← Back to handout · 回講義</a>
    </div>
  </main>

  <div class="foot">
    Festival English Series · 2026 Curriculum &nbsp;·&nbsp;
    <a href="../">View the lesson handout · 查看講義</a>
  </div>
</div>

<script>
const QUIZ = [
  { q:'Who was the loyal poet that Dragon Boat Festival remembers?',
    zh:'端午節是為了紀念哪一位忠誠的詩人？',
    options:['Confucius','Qu Yuan','Sun Tzu','Li Bai'], answer:1,
    explain:'屈原 Qu Yuan——楚國的詩人，五月初五投汨羅江以身殉國。' },

  { q:'Sticky rice with fillings wrapped in bamboo leaves is called ____.',
    zh:'用竹葉包著糯米和餡料的食物叫做 ____。',
    options:['Tangyuan','Dumpling','Zongzi','Mooncake'], answer:2,
    explain:'"Zongzi" 粽子——bamboo leaves wrapping sticky rice。' },

  { q:'Which word means "a person who writes poetry"?',
    zh:'哪一個單字代表「寫詩的人」？',
    options:['Painter','Poet','Sailor','Drummer'], answer:1,
    explain:'"Poet" 詩人——屈原 was a famous poet of ancient Chu。' },

  { q:'Which verb means "to push a boat through water with a paddle"?',
    zh:'哪一個動詞是「用槳划船」？',
    options:['Cheer','Race','Paddle','Hang'], answer:2,
    explain:'"Paddle" 划槳——twenty rowers paddle together as a team。' },

  { q:'Which adjective means "always supporting your country or family"?',
    zh:'哪一個形容詞代表「對國家或家人忠誠的」？',
    options:['Sweet','Loyal','Brave','Loud'], answer:1,
    explain:'"Loyal" 忠誠——Qu Yuan was loyal to his country until the very end。' },

  { q:'What do villagers throw into the river to keep Qu Yuan safe from the fish?',
    zh:'村民把什麼丟入江中，希望魚兒不會去吃屈原？',
    options:['Flowers','Stones','Rice in bamboo leaves','Bread'], answer:2,
    explain:'用竹葉裹著的糯米——後來變成粽子，每年家家戶戶都包來紀念屈原。' },

  { q:'What do drummers do during the dragon boat race?',
    zh:'龍舟賽中，鼓手的工作是什麼？',
    options:['Keep the paddlers in a steady rhythm','Steer the boat','Wave a flag','Sing a song'], answer:0,
    explain:'鼓手坐在船首敲鼓，幫助二十位划手保持 steady rhythm 一致節奏。' },

  { q:'When exactly do families try to stand an egg upright?',
    zh:'家家戶戶會在什麼時刻嘗試立蛋？',
    options:['Sunrise','At exactly noon','Midnight','When it rains'], answer:1,
    explain:'正午十二點——傳說那一刻是一年中陽氣最強的時間，蛋最容易立起來。' },

  { q:'A small embroidered pouch with herbs worn for the festival is called a ____.',
    zh:'端午節掛在身上、裡面裝香草的小袋子叫做 ____。',
    options:['Lantern','Sachet','Couplet','Drum'], answer:1,
    explain:'"Sachet" 香包——傳統說法是辟邪，現在更多是好聞 + 紀念。' },

  { q:'Amy: "Listen to how the paddlers keep such a ____ rhythm."',
    zh:'Roleplay 1：「聽聽划手們保持得多 ____ 的節奏。」',
    options:['steady','loud','fast','heavy'], answer:0,
    explain:'Scenario 1 用 steady——龍舟成功的關鍵是 a steady rhythm。' },

  { q:'Grandma: "We eat zongzi to remember Qu Yuan, the ____ poet."',
    zh:'Roleplay 2：「我們吃粽子，為了紀念那位 ____ 的詩人屈原。」',
    options:['brave','loyal','sweet','famous'], answer:1,
    explain:'Scenario 2 用 loyal——強調屈原對國家的忠誠。' },

  { q:'Teacher: "Be patient and ____. Hold the egg gently, then let go slowly."',
    zh:'Roleplay 3 立蛋：「要有耐心、要 ____。輕輕扶著蛋，慢慢放手。」',
    options:['quick','brave','loud','strong'], answer:1,
    explain:'Scenario 3 用 brave——勇敢一點才能讓蛋立起來。' },
];

const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);
const state = { idx:0, score:0, answers:[] };

function render(){
  const q = QUIZ[state.idx];
  $('#qno').textContent = `Question ${state.idx + 1} / ${QUIZ.length}`;
  $('#bar').style.width = (state.idx / QUIZ.length * 100) + '%';
  $('#question').textContent = q.q;
  $('#question-zh').textContent = q.zh;
  $('#feedback').textContent = '';
  $('#feedback').className = 'feedback';
  const box = $('#options');
  box.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="opt__mark">${'ABCD'[i]}</span><span>${opt}</span>`;
    btn.addEventListener('click', () => answer(i, btn));
    box.appendChild(btn);
  });
  $('#question').scrollIntoView({behavior:'smooth', block:'start'});
}

function answer(picked, btn){
  const q = QUIZ[state.idx];
  const ok = picked === q.answer;
  state.answers.push({ q: state.idx, picked, correct: ok });
  if(ok) state.score++;
  $$('#options .opt').forEach((b, i) => {
    b.disabled = true;
    if(i === q.answer) b.classList.add('is-correct');
    if(i === picked && !ok) b.classList.add('is-wrong');
  });
  const fb = $('#feedback');
  fb.classList.add('show');
  fb.classList.add(ok ? 'feedback--ok' : 'feedback--ng');
  fb.innerHTML = ok
    ? `✓ Correct! 答對了！<br><span style="font-weight:500;">${q.explain}</span>`
    : `✗ The answer is: <b>${q.options[q.answer]}</b><br><span style="font-weight:500;">${q.explain}</span>`;
  $('#bar').style.width = ((state.idx + 1) / QUIZ.length * 100) + '%';
  setTimeout(() => {
    state.idx++;
    if(state.idx >= QUIZ.length) finish();
    else render();
  }, 2200);
}

function finish(){
  const total = QUIZ.length, score = state.score, pct = Math.round(score / total * 100);
  $('#r-score').textContent = score;
  $('#r-total').textContent = total;
  $('#r-pct').textContent = `(${pct}%)`;
  let emoji, title, msgEn, msgZh;
  if(pct === 100)      { emoji='🏆'; title='Perfect score!';   msgEn='Steady drums, steady mind — a champion paddler!'; msgZh='滿分！你已經是一支龍舟的領隊了！'; }
  else if(pct >= 80)   { emoji='🐉'; title='Excellent work!';  msgEn='Wonderful — you understand the spirit of the festival!'; msgZh='做得很好！你掌握了端午節的精神。'; }
  else if(pct >= 60)   { emoji='🥟'; title='Good effort!';     msgEn='Nice try — review the story of Qu Yuan and the traditions once more.'; msgZh='繼續加油！再讀一次屈原的故事和習俗。'; }
  else                 { emoji='📜'; title='Keep practicing!'; msgEn="Don't give up — go back to the handout and try again!"; msgZh='不要放棄！回去再讀一次講義就會了。'; }
  $('#r-emoji').textContent = emoji;
  $('#r-title').textContent = title;
  $('#r-msg-en').textContent = msgEn;
  $('#r-msg-zh').textContent = msgZh;
  $('#quiz-card').style.display = 'none';
  $('#result-card').style.display = 'flex';
  $('#result-card').style.flexDirection = 'column';
  $('#result-card').style.alignItems = 'center';
  $('#result-card').scrollIntoView({behavior:'smooth', block:'start'});
}

$('#btn-restart').addEventListener('click', () => {
  state.idx = 0; state.score = 0; state.answers = [];
  $('#result-card').style.display = 'none';
  $('#quiz-card').style.display = 'flex';
  render();
});

render();
</script>
<script src="../../_shared/schoolbar.js"></script>
</body>
</html>
