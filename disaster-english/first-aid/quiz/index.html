<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Unit 05 Quiz · First Aid &amp; CPR · Disaster English</title>
<meta name="description" content="10-question quiz for Unit 05 — First Aid &amp; CPR. Easy English, mobile-friendly, immediate feedback.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--navy:#2a2725;--orange:#d97818;--orange-deep:#a85a0c;--orange-soft:#fce7d0;--red:#e63d2e;--red-soft:#fde2dd;--green:#5b9d5b;--green-soft:#e7f3e7;--cream:#fbf7e8;--cream-warm:#fffcef;--line:#e3dfca;--ink:#1f1d1a;--ink-soft:#5e574e;--shadow:0 16px 40px -16px rgba(42,39,37,.30);--shadow-sm:0 6px 18px -6px rgba(42,39,37,.20);}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{min-height:100%;background:#fff;color:var(--ink);font-family:'Inter','PingFang TC','Apple LiGothic Medium','Microsoft JhengHei',sans-serif;font-size:21px;line-height:1.6;-webkit-font-smoothing:antialiased;}
  @media (min-width:720px){ html,body{ font-size:24px; } }
  .wrap{max-width:840px;margin:0 auto;padding:32px 22px 60px;min-height:100vh;display:flex;flex-direction:column;}

  .cb-back-strip{background:var(--cream-warm);border-bottom:2px solid var(--orange);padding:12px 24px;display:flex;justify-content:center;align-items:center;gap:12px;font-family:'Playfair Display','PingFang TC',serif;font-size:15px;font-weight:600;position:sticky;top:0;z-index:100;flex-wrap:wrap;margin:-32px -22px 0;}
  @media (min-width:720px){.cb-back-strip{font-size:17px;padding:16px 24px;gap:16px;margin:-32px -22px 0;}}
  .cb-back-strip a{color:var(--navy);text-decoration:none;display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:99px;background:#fff;border:1.5px solid var(--orange);transition:all .15s;}
  .cb-back-strip a:hover{background:var(--orange);color:#fff;transform:translateX(-2px);}
  .cb-back-strip .arrow{font-size:1.2em;}
  .cb-back-strip a[hidden]{display:none;}

  .head{background:linear-gradient(135deg, var(--navy) 0%, var(--orange-deep) 100%);color:#fff;border-radius:20px;padding:28px 28px;text-align:center;border-bottom:6px solid var(--orange);box-shadow:var(--shadow);margin-top:24px;}
  .head__brand{font-size:13px;letter-spacing:3px;color:var(--orange-soft);text-transform:uppercase;font-weight:700;margin-bottom:8px;}
  @media (min-width:720px){ .head__brand{ font-size:15px; } }
  .head__title{font-family:'Playfair Display',serif;font-size:32px;font-weight:800;letter-spacing:.5px;line-height:1.1;}
  @media (min-width:720px){ .head__title{ font-size:44px; } }
  .head__sub{color:#ffe1c2;font-size:16px;margin-top:8px;font-style:italic;}
  @media (min-width:720px){ .head__sub{ font-size:19px; } }

  .card{background:#fff;border-radius:24px;border:1px solid var(--line);box-shadow:var(--shadow);padding:32px 28px;margin-top:24px;flex:1;display:flex;flex-direction:column;}
  @media (min-width:720px){ .card{ padding:44px 40px; } }

  .progress{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
  .progress__no{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--orange-deep);letter-spacing:1.5px;}
  @media (min-width:720px){ .progress__no{ font-size:22px; } }
  .progress__bar{flex:1;margin-left:18px;height:8px;background:var(--cream-warm);border:1px solid var(--line);border-radius:99px;overflow:hidden;}
  @media (min-width:720px){ .progress__bar{ height:10px; } }
  .progress__fill{height:100%;background:var(--orange);border-radius:99px;transition:width .3s ease;width:0%;}

  .question{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--navy);line-height:1.4;margin-top:8px;letter-spacing:.2px;}
  @media (min-width:720px){ .question{ font-size:32px; } }
  .question__zh{font-size:17px;color:var(--ink-soft);line-height:1.55;margin-top:10px;}
  @media (min-width:720px){ .question__zh{ font-size:20px; } }

  .options{display:flex;flex-direction:column;gap:14px;margin-top:28px;}
  .opt{background:#fff;border:2px solid var(--line);border-radius:14px;padding:18px 20px;font-size:20px;font-family:inherit;font-weight:600;color:var(--ink);text-align:left;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:16px;line-height:1.4;}
  @media (min-width:720px){ .opt{ font-size:24px;padding:22px 24px; } }
  .opt:hover:not(:disabled){border-color:var(--orange);background:var(--cream-warm);transform:translateX(2px);}
  .opt__mark{width:42px;height:42px;border-radius:50%;background:var(--cream-warm);color:var(--navy);display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;font-size:18px;border:2px solid var(--line);font-family:'Playfair Display',serif;}
  @media (min-width:720px){ .opt__mark{ width:48px;height:48px;font-size:20px; } }
  .opt.is-correct{background:var(--green-soft);border-color:var(--green);color:#2c6b2c;}
  .opt.is-correct .opt__mark{background:var(--green);color:#fff;border-color:var(--green);}
  .opt.is-wrong{background:var(--red-soft);border-color:var(--red);color:#8b2e22;}
  .opt.is-wrong .opt__mark{background:var(--red);color:#fff;border-color:var(--red);}
  .opt:disabled{cursor:default;}

  .feedback{margin-top:22px;padding:14px 18px;border-radius:12px;font-size:17px;font-weight:600;text-align:center;line-height:1.5;min-height:0;opacity:0;transition:opacity .2s;}
  @media (min-width:720px){ .feedback{ font-size:20px; } }
  .feedback.show{opacity:1;}
  .feedback--ok{background:var(--green-soft);color:#2c6b2c;border:1.5px solid var(--green);}
  .feedback--ng{background:var(--red-soft);color:#8b2e22;border:1.5px solid var(--red);}

  .result{text-align:center;}
  .result__emoji{font-size:72px;line-height:1;}
  @media (min-width:720px){ .result__emoji{ font-size:96px; } }
  .result__title{font-family:'Playfair Display',serif;font-size:34px;font-weight:700;color:var(--navy);margin-top:14px;letter-spacing:.5px;}
  @media (min-width:720px){ .result__title{ font-size:46px; } }
  .result__score{font-family:'Playfair Display',serif;font-size:64px;font-weight:800;color:var(--orange);margin:18px 0 6px;line-height:1;}
  @media (min-width:720px){ .result__score{ font-size:88px; } }
  .result__score small{font-size:28px;color:var(--ink-soft);font-weight:600;font-family:inherit;}
  @media (min-width:720px){ .result__score small{ font-size:36px; } }
  .result__msg{font-size:20px;color:var(--ink);line-height:1.6;margin-top:16px;max-width:560px;margin-left:auto;margin-right:auto;}
  @media (min-width:720px){ .result__msg{ font-size:24px; } }
  .result__zh{font-size:16px;color:var(--ink-soft);margin-top:6px;}
  @media (min-width:720px){ .result__zh{ font-size:18px; } }

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:18px 32px;font-size:20px;font-weight:700;font-family:inherit;letter-spacing:.5px;border:none;border-radius:14px;cursor:pointer;text-decoration:none;transition:transform .15s, box-shadow .15s, background .15s;}
  @media (min-width:720px){ .btn{ font-size:22px;padding:20px 36px; } }
  .btn:active{transform:scale(.97);}
  .btn--primary{background:var(--orange);color:#fff;box-shadow:0 6px 18px -6px rgba(217,120,24,.5);}
  .btn--primary:hover{background:var(--orange-deep);}
  .btn--ghost{background:#fff;color:var(--navy);border:2px solid var(--line);}
  .btn--ghost:hover{background:var(--cream-warm);border-color:var(--orange);}

  .result__actions{display:flex;flex-direction:column;gap:12px;margin-top:32px;align-items:center;}
  @media (min-width:720px){ .result__actions{ flex-direction:row;justify-content:center;gap:16px; } }
  .result__actions .btn{min-width:240px;}

  .foot{text-align:center;font-size:13px;color:var(--ink-soft);font-style:italic;letter-spacing:.5px;margin-top:24px;}
  @media (min-width:720px){ .foot{ font-size:15px; } }
  .foot a{color:var(--orange-deep);text-decoration:none;border-bottom:1px solid var(--orange-soft);}
  .foot a:hover{color:var(--orange);}
</style>
<script defer src="/analytics.js"></script>
</head>
<body>

<div class="wrap">

<div id="cb-back-strip" class="cb-back-strip">
  <a href="../"><span class="arrow">←</span><span>Lesson</span></a>
  <a id="cb-back-link" href="#" hidden><span class="arrow">←</span><span id="cb-back-text">Back</span></a>
</div>
<script>
(function(){
  var p = new URLSearchParams(window.location.search);
  var from = p.get('from');
  if(from){ try{ sessionStorage.setItem('cb_from_school', from); }catch(e){} }
  if(!from){ try{ from = sessionStorage.getItem('cb_from_school'); }catch(e){} }
  var dest = {
    'dajuang':  { label:'Lessons',            url:'/schools/dajuang/lessons/' },
    'dacheng':  { label:'Lessons',            url:'/schools/dacheng/lessons/' },
    'yangming': { label:'Yangming JHS',       url:'/schools/yangming/' },
    'huatan':   { label:'Huatan Elementary',  url:'/schools/huatan/' }
  };
  var link = document.getElementById('cb-back-link');
  var text = document.getElementById('cb-back-text');
  if(!link || !text) return;
  if(from && dest[from]){
    link.href = dest[from].url;
    text.textContent = 'Back to ' + dest[from].label;
    link.hidden = false;
  } else if(from){
    link.href = '/schools/' + encodeURIComponent(from) + '/';
    text.textContent = 'Back to ' + from;
    link.hidden = false;
  }
  // else: no `from` context — leave link hidden (it's hidden by default)
})();
</script>

  <header class="head">
    <div class="head__brand">Disaster English · Unit 05</div>
    <h1 class="head__title">First Aid &amp; CPR Quiz</h1>
    <div class="head__sub">10 easy questions · 共 10 題 · Call 119, Check, Press Hard</div>
  </header>

  <main class="card" id="quiz-card">
    <div class="progress"><div class="progress__no" id="qno">Question 1 / 10</div><div class="progress__bar"><div class="progress__fill" id="bar"></div></div></div>
    <div class="question" id="question">Loading…</div>
    <div class="question__zh" id="question-zh"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
  </main>

  <main class="card result" id="result-card" style="display:none;">
    <div class="result__emoji" id="r-emoji">🎉</div>
    <div class="result__title" id="r-title">Well done!</div>
    <div class="result__score"><span id="r-score">0</span> / <span id="r-total">10</span><small id="r-pct">(0%)</small></div>
    <p class="result__msg" id="r-msg-en">You did great!</p>
    <p class="result__zh" id="r-msg-zh">完成了！</p>
    <div class="result__actions">
      <button class="btn btn--primary" id="btn-restart">Try again · 再試一次</button>
      <a class="btn btn--ghost" href="../">← Back to lesson</a>
    </div>
  </main>

  <div class="foot">Disaster English Series · <a href="https://changhua-bilingual.org/">My Culture Connect</a> &nbsp;·&nbsp; <a href="../../">All lessons</a></div>
</div>

<script>
const QUIZ = [
  { q:'In Taiwan, what number do you call for an emergency?', zh:'台灣緊急電話是幾號？', options:['100','119','911','110'], answer:1, explain:'In Taiwan: 119 for fire, ambulance, and rescue. 110 is police. 台灣 119 是消防 / 救護 / 救援。' },
  { q:'What is an "emergency"?', zh:'什麼是 "emergency"？', options:['A holiday','A serious problem that needs help fast','A game','A snack'], answer:1, explain:'Emergency = a serious problem that needs help fast. 緊急情況。' },
  { q:'What is "CPR"?', zh:'什麼是 CPR？', options:['A type of food','A way to help someone who isn\'t breathing','A song','A toy'], answer:1, explain:'CPR = Cardiopulmonary Resuscitation. Press hard on the chest to help someone breathe again. 心肺復甦術。' },
  { q:'When doing CPR, where do you press?', zh:'做 CPR 時要按哪裡？', options:['The head','The arm','The middle of the chest','The foot'], answer:2, explain:'Press in the middle of the chest, hard and fast. 胸口中央，用力快速。' },
  { q:'What does the ambulance bring?', zh:'救護車帶來什麼？', options:['Food','Doctors and nurses','Toys','Homework'], answer:1, explain:'An ambulance brings paramedics to help. 救護車帶醫護人員。' },
  { q:'What is in a "first aid kit"?', zh:'"first aid kit"（急救箱）裡有什麼？', options:['Books','Bandages, scissors, and basic medicine','Toys','Food'], answer:1, explain:'Bandages, antiseptic, scissors, etc. 繃帶、剪刀、基本藥品。' },
  { q:'Before doing CPR, you should first check if the person...', zh:'做 CPR 前應該先檢查...', options:['has a phone','is breathing','has shoes','is hungry'], answer:1, explain:'Check if they\'re breathing. 檢查是否還有呼吸。' },
  { q:'What does "save" mean?', zh:'"save" 是什麼意思？', options:['To eat','To keep someone safe or alive','To run','To laugh'], answer:1, explain:'Save = keep someone safe or alive. 救。' },
  { q:'When you call 119, what do you tell them?', zh:'打 119 時要告訴他們什麼？', options:['Your favorite color','Where you are and what happened','A joke','Your homework'], answer:1, explain:'Where you are + what happened. 地點 + 發生什麼事。' },
  { q:'If a friend is hurt and the neck looks bad, you should...', zh:'朋友受傷而且脖子看起來不對，應該...', options:['Move them quickly','NOT move them, call for help','Carry them home','Give them water'], answer:1, explain:'Never move someone with a possible neck injury. Wait for help. 不要移動，等專業人員。' },
];

const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);
const state = { idx:0, score:0, answers:[] };

function render(){
  const q = QUIZ[state.idx];
  $('#qno').textContent = `Question ${state.idx + 1} / ${QUIZ.length}`;
  $('#bar').style.width = (state.idx / QUIZ.length * 100) + '%';
  $('#question').textContent = q.q;
  $('#question-zh').textContent = q.zh;
  $('#feedback').textContent = '';
  $('#feedback').className = 'feedback';
  const box = $('#options');
  box.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="opt__mark">${'ABCD'[i]}</span><span>${opt}</span>`;
    btn.addEventListener('click', () => answer(i, btn));
    box.appendChild(btn);
  });
  $('#question').scrollIntoView({behavior:'smooth', block:'start'});
}

function answer(picked, btn){
  const q = QUIZ[state.idx];
  const ok = picked === q.answer;
  state.answers.push({ q: state.idx, picked, correct: ok });
  if(ok) state.score++;
  $$('#options .opt').forEach((b, i) => {
    b.disabled = true;
    if(i === q.answer) b.classList.add('is-correct');
    if(i === picked && !ok) b.classList.add('is-wrong');
  });
  const fb = $('#feedback');
  fb.classList.add('show');
  fb.classList.add(ok ? 'feedback--ok' : 'feedback--ng');
  fb.innerHTML = ok
    ? `✓ Correct! 答對了！<br><span style="font-weight:500;">${q.explain}</span>`
    : `✗ The answer is: <b>${q.options[q.answer]}</b><br><span style="font-weight:500;">${q.explain}</span>`;
  $('#bar').style.width = ((state.idx + 1) / QUIZ.length * 100) + '%';
  setTimeout(() => {
    state.idx++;
    if(state.idx >= QUIZ.length) finish();
    else render();
  }, 2400);
}

function finish(){
  const total = QUIZ.length;
  const score = state.score;
  const pct = Math.round(score / total * 100);
  $('#r-score').textContent = score;
  $('#r-total').textContent = total;
  $('#r-pct').textContent = `(${pct}%)`;
  let emoji, title, msgEn, msgZh;
  if(pct === 100)      { emoji='🏆'; title='Perfect score!';   msgEn='You\'re a safety champion!'; msgZh='滿分！你是安全高手！'; }
  else if(pct >= 80)   { emoji='🌟'; title='Excellent work!';  msgEn='You really know what to do.'; msgZh='做得很好！'; }
  else if(pct >= 60)   { emoji='💪'; title='Good effort!';     msgEn='Read the lesson once more — you\'ll get it.'; msgZh='再看一次講義就更熟了。'; }
  else                 { emoji='📖'; title='Keep practicing!'; msgEn='Don\'t worry — read the lesson and try again.'; msgZh='別擔心！再考一次。'; }
  $('#r-emoji').textContent = emoji;
  $('#r-title').textContent = title;
  $('#r-msg-en').textContent = msgEn;
  $('#r-msg-zh').textContent = msgZh;
  $('#quiz-card').style.display = 'none';
  $('#result-card').style.display = 'flex';
  $('#result-card').style.flexDirection = 'column';
  $('#result-card').style.alignItems = 'center';
  $('#result-card').scrollIntoView({behavior:'smooth', block:'start'});
}

$('#btn-restart').addEventListener('click', () => {
  state.idx = 0; state.score = 0; state.answers = [];
  $('#result-card').style.display = 'none';
  $('#quiz-card').style.display = 'flex';
  render();
});
render();
</script>
</body>
</html>
